          description: Filter sessions by status
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      sessions:
                        type: array
                        items:
                          $ref: '#/components/schemas/BienBotSession'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Feature flag not enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /bienbot/sessions/{id}:
    get:
      summary: Get BienBot Session
      description: Get a single BienBot session by ID. Only the session owner can access it.
      tags:
        - BienBot
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Session ID
      responses:
        '200':
          description: Session details
          content:
