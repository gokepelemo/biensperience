          schema:
            type: integer
            default: 30
          description: Number of activities to return
        - name: before
          in: query
          schema:
            type: string
            format: date-time
          description: Cursor-based pagination - return activities before this timestamp
      responses:
        '200':
          description: Experience activity feed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  activities:
                    type: array
                    items:
                      $ref: '#/components/schemas/Activity'
                  hasMore:
                    type: boolean

  /activities/resource/{resourceId}:
    get:
      summary: Get Resource History
      description: Returns activity history for a specific resource. Requires owner, collaborator, or admin access.
      tags:
        - Activities
      security:
        - bearerAuth: []
      parameters:
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
          description: Resource ID
      responses:
        '200':
          description: Resource activity history
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
