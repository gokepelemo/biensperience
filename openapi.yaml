          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete BienBot Session
      description: |
        Archive a BienBot session (soft delete). The session is not permanently deleted
        but set to 'archived' status and excluded from default session listing.
      tags:
        - BienBot
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Session ID
      responses:
        '200':
          description: Session archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '400':
          description: Invalid session ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /bienbot/sessions/{id}/resume:
    post:
      summary: Resume BienBot Session
      description: |
        Resume a past BienBot session. Generates or returns a cached summary of the
        conversation history and a greeting message with suggested next steps.

        - Sessions with < 3 messages return a static "Welcome back!" greeting.
        - Longer sessions run the session summarizer (LLM call).
        - Summaries are cached with a 6-hour TTL.
      tags:
        - BienBot
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Session ID
      responses:
        '200':
          description: Session resumed with greeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BienBotResumeResponse'
        '400':
          description: Invalid session ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /bienbot/sessions/{id}/execute:
    post:
      summary: Execute BienBot Pending Actions
      description: |
        Execute one or more pending actions from a BienBot session. Each action is
        validated against the session's pending_actions list and delegated to the
        appropriate controller (destinations, experiences, plans, etc.).

        Results include per-action success/failure status and any entity IDs added
        to the session context.
      tags:
        - BienBot
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Session ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BienBotExecuteRequest'
      responses:
        '200':
          description: Actions executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BienBotExecuteResponse'
        '400':
          description: Invalid action IDs or already executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /bienbot/sessions/{id}/pending/{actionId}:
    delete:
      summary: Cancel BienBot Pending Action
      description: Remove a specific pending action from a BienBot session without executing it.
      tags:
        - BienBot
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Session ID
        - name: actionId
          in: path
          required: true
          schema:
            type: string
          description: Pending action ID to remove
      responses:
        '200':
          description: Pending action removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '400':
          description: Invalid session ID or action ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Session or action not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'