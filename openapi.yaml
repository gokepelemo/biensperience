      description: Returns user's dashboard with stats, recent activity, and upcoming plans
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dashboard'

  /dashboard/activity-feed:
    get:
      summary: Get Activity Feed
      description: |
        Returns the authenticated user's enriched activity feed with pagination.
        Activities include human-readable text, deep links, and actor photo URLs.
        Supports filtering by action types and resource types.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - name: actions
          in: query
          schema:
            type: array
            items:
              type: string
          description: Filter by action types (e.g., plan_created, resource_updated)
        - name: resourceTypes
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [Experience, Destination, Plan, User]
          description: Filter by resource types
      responses:
        '200':
          description: Enriched activity feed with pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  activities:
                    type: array
                    items:
                      $ref: '#/components/schemas/EnrichedActivityFeedItem'
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      totalCount:
                        type: integer
                      totalPages:
                        type: integer
                      hasMore:
                        type: boolean

  /dashboard/upcoming-plans:
    get:
      summary: Get Upcoming Plans
      description: Returns user's upcoming plans
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Upcoming plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Plan'

  /tokens:
    get:
      summary: Get API Tokens
      description: Returns all API tokens for the current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of API tokens
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Token'

    post:
      summary: Create API Token
      description: Creates a new API token
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                permissions:
                  type: array
                  items:
                    type: string
                    enum: [read, write, admin]
                  default: [read]
                expiresAt:
                  type: string
                  format: date-time
              required:
                - name
      responses:
        '201':
          description: Token created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  token:
                    type: string
                    description: The actual API token (only shown once)
                  tokenData:
                    $ref: '#/components/schemas/Token'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tokens/{id}:
    parameters:
      - $ref: '#/components/parameters/tokenId'
    delete:
      summary: Delete API Token
      description: Deletes an API token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Token not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /invites:
    get:
      summary: Get Sent Invites
      description: Returns invites sent by the current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of sent invites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invite'

    post:
      summary: Send Invite
      description: Sends an invitation to join the platform
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                message:
                  type: string
              required:
                - email
      responses:
        '201':
          description: Invite sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: User already exists or invite already sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /invites/{id}:
    parameters:
      - $ref: '#/components/parameters/inviteId'
    delete:
      summary: Cancel Invite
      description: Cancels a pending invite
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Invite cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Invite not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /invite-tracking/{code}:
    get:
      summary: Track Invite
      description: Tracks invite usage and redirects appropriately
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          description: Invite code
      responses:
        '302':
          description: Redirect to signup or login
        '404':
          description: Invalid invite code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /activities:
    get:
      summary: Get All Activities (Admin)
      description: Returns all activities with optional filtering. Requires super admin access.
      tags:
        - Activities
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [user, resource, all]
            default: user
          description: Activity scope
        - name: resourceType
          in: query
          schema:
            type: string
            enum: [User, Destination, Experience, Plan, Photo, Document]
          description: Filter by resource type
        - name: resourceId
          in: query
          schema:
            type: string
          description: Filter by specific resource ID
        - name: action
          in: query
          schema:
            type: string
          description: Filter by action type
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Activity feed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Activity'
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      totalCount:
                        type: integer
                      totalPages:
                        type: integer
                      hasMore:
                        type: boolean
        '403':
          description: Requires super admin access

  /activities/stats:
    get:
      summary: Get Activity Statistics (Admin)
      description: Returns aggregated activity statistics. Requires super admin access.
      tags:
        - Activities
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Activity statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
        '403':
          description: Requires super admin access

  /activities/experience/{experienceId}/feed:
    get:
      summary: Get Experience Activity Feed
      description: |
        Returns the public activity feed for an experience.
        Shows entries like planning activity, photo uploads, and visibility changes.
        Uses cursor-based pagination.
