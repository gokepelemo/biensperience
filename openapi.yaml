          schema:
            type: string
          description: User ID
      responses:
        '200':
          description: User activity history
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Activity'

  /activities/curator/planners:
