  # BienBot AI Assistant Endpoints
  # All endpoints require authentication, the 'ai_features' feature flag, and are rate limited (30 req/15 min)

  /bienbot/chat:
    post:
      summary: BienBot Chat
      description: |
        Main chat endpoint for the BienBot AI assistant. Runs the full pipeline:
        classify intent, build context, call LLM, parse structured response, store session,
        and stream the response via Server-Sent Events (SSE).

        **Peer exchange (shared comments):**
        Messages are routed to the shared-comment path (bypassing the LLM) when:
        - The sender is a session collaborator (non-owner), or
        - The message starts with the `/message` slash command (e.g. `/message @Alice hey!`), or
        - The message is a direct reply to a collaborator message.
        The `/message` prefix is stripped before the content is saved.
        Shared-comment messages receive `message_type: 'shared_comment'` and `sent_by` (sender ObjectId).

        **SSE Events:**
        - `session` — `{ sessionId, title }` (sent first)
        - `token` — `{ text }` (repeated, ~50 char chunks)
        - `actions` — `{ pending_actions }` (if LLM proposes actions)
        - `done` — `{ usage, intent, confidence }` (signals completion)

        Rate limited to 30 requests per 15 minutes. Super admins bypass rate limiting.
      tags:
        - BienBot
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BienBotChatRequest'
      responses:
        '200':
          description: SSE stream of chat response
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events stream with session, token, actions, and done events
        '400':
          description: Invalid request (missing message, invalid sessionId, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Feature flag not enabled or no permission to view entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: AI service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /bienbot/sessions:
    get:
      summary: List BienBot Sessions
      description: |
        List BienBot sessions for the authenticated user, most recent first.
        Optionally filter by status (active or archived).
      tags:
        - BienBot
      security:
        - bearerAuth: []
      parameters:
