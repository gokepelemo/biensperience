            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
        '403':
          description: Requires curator feature flag

  # Document endpoints
  /documents/supported-types:
    get:
      summary: Get Supported Document Types
      description: Returns list of supported document types and size limits
      tags:
        - Documents
      responses:
        '200':
          description: Supported document types
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      pdf:
                        type: object
                        properties:
                          maxSize:
                            type: integer
                          mimeTypes:
                            type: array
                            items:
                              type: string
                      image:
                        type: object
                        properties:
                          maxSize:
                            type: integer
                          mimeTypes:
                            type: array
                            items:
                              type: string
                      word:
                        type: object
                        properties:
                          maxSize:
                            type: integer
                          mimeTypes:
                            type: array
                            items:
                              type: string
                      text:
                        type: object
                        properties:
                          maxSize:
                            type: integer
                          mimeTypes:
                            type: array
                            items:
                              type: string

  /documents:
    post:
      summary: Upload Document
      description: Upload and process a document with optional AI parsing
      tags:
        - Documents
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - document
                - entityType
                - entityId
              properties:
                document:
                  type: string
                  format: binary
                  description: Document file (PDF, image, Word, or text)
                entityType:
                  type: string
                  enum: [plan, plan_item, experience, destination]
                entityId:
                  type: string
                  description: ID of the entity to attach document to
                planId:
                  type: string
                  description: Required when entityType is plan_item
                planItemId:
                  type: string
                  description: Optional plan item reference
                aiParsingEnabled:
                  type: boolean
                  default: true
                documentTypeHint:
                  type: string
                  enum: [flight, hotel, activity, restaurant, transport, travel]
                language:
                  type: string
                  default: eng
                forceLLM:
                  type: boolean
                skipLLMFallback:
                  type: boolean
      responses:
        '201':
          description: Document uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '400':
          description: Invalid request or unsupported file type
        '401':
          description: Unauthorized
        '413':
          description: File too large

  /documents/{id}:
    get:
      summary: Get Document
      description: Get a document by ID
      tags:
        - Documents
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Document details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
        '404':
          description: Document not found
    delete:
      summary: Delete Document
      description: Delete a document (owner only)
      tags:
        - Documents
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Document deleted
        '401':
          description: Unauthorized
        '403':
          description: Only document owner can delete
        '404':
          description: Document not found

  /documents/entity/{entityType}/{entityId}:
    get:
      summary: Get Documents by Entity
      description: Get all documents attached to an entity
      tags:
        - Documents
      security:
        - bearerAuth: []
      parameters:
        - name: entityType
          in: path
          required: true
          schema:
            type: string
            enum: [plan, plan_item, experience, destination]
        - name: entityId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of documents
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Document'
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions

  /documents/{id}/reprocess:
    post:
      summary: Reprocess Document
      description: Re-extract text and/or re-parse document with AI
      tags:
        - Documents
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                language:
                  type: string
                forceLLM:
                  type: boolean
                skipLLMFallback:
                  type: boolean
                documentTypeHint:
                  type: string
      responses:
        '200':
          description: Document reprocessed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '400':
          description: Cannot reprocess - max attempts reached
        '401':
          description: Unauthorized
        '403':
          description: Insufficient permissions
        '404':
          description: Document not found

  /follows/feed:
    get:
      summary: Get Follow Feed
      description: |
        Returns enriched activity feed from users the authenticated user follows.
        Activities include human-readable text, deep links, and actor photo URLs.
        Supports filtering by action types and resource types.
      tags:
        - Follows
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
          description: Number of activities to return
        - name: skip
          in: query
          schema:
            type: integer
            default: 0
          description: Number of activities to skip
        - name: actions
          in: query
          schema:
            type: string
          description: Comma-separated list of action types to filter by
        - name: resourceTypes
          in: query
          schema:
            type: string
          description: Comma-separated list of resource types to filter by
      responses:
        '200':
          description: Enriched follow activity feed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  feed:
                    type: array
                    items:
                      $ref: '#/components/schemas/EnrichedActivityFeedItem'
                  total:
                    type: integer
                  limit:
                    type: integer
                  skip:
                    type: integer
                  followingCount:
                    type: integer

  /follows/requests:
    get:
      summary: Get Follow Requests
      description: Returns pending follow requests for private profile users
      tags:
        - Follows
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Pending follow requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  requests:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                        follower:
                          $ref: '#/components/schemas/User'
                        status:
                          type: string
                          enum: [pending, accepted, blocked]
                        createdAt:
                          type: string
                          format: date-time

  /follows/requests/count:
    get:
      summary: Get Follow Request Count
      description: Returns count of pending follow requests
      tags:
        - Follows
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Request count
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer

  /follows/requests/{followerId}/accept:
    put:
      summary: Accept Follow Request
      description: Accepts a pending follow request
      tags:
        - Follows
      security:
        - bearerAuth: []
      parameters:
        - name: followerId
          in: path
          required: true
          schema:
            type: string
          description: Follower user ID
      responses:
        '200':
          description: Follow request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /follows/requests/{followerId}:
    delete:
      summary: Reject Follow Request
      description: Rejects a pending follow request
      tags:
        - Follows
      security:
        - bearerAuth: []
      parameters:
        - name: followerId
          in: path
          required: true
          schema:
            type: string
          description: Follower user ID
      responses:
        '200':
          description: Follow request rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /follows/{userId}:
    post:
      summary: Follow User
      description: |
        Follows another user. For private profiles, creates a pending follow request.

        **Idempotent** — if the authenticated user is already following the target, returns
        `200 { success: true, message: 'Already following' }` instead of an error.
        This prevents spurious failures on double-tap or rapid UI interactions.
      tags:
        - Follows
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User ID to follow
      responses:
        '200':
          description: Already following (idempotent — no action taken)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Already following
        '201':
          description: User followed successfully (or request sent for private profiles)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '400':
          description: Validation error (e.g. cannot follow self, or pending request already exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Unfollow User
      description: |
        Unfollows a user.

        **Idempotent** — if the authenticated user is not currently following the target,
        returns `200 { success: true, message: 'Not following' }` instead of a 404 error.
      tags:
        - Follows
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User ID to unfollow
      responses:
        '200':
          description: User unfollowed successfully (or was not following — idempotent)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Unfollowed successfully
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /follows/{userId}/followers:
    get:
      summary: Get Followers
      description: Returns list of users who follow the specified user
      tags:
        - Follows
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User ID
      responses:
        '200':
          description: Followers list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  followers:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  total:
                    type: integer

  /follows/{userId}/following:
    get:
      summary: Get Following
      description: Returns list of users the specified user follows
      tags:
        - Follows
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User ID
      responses:
        '200':
          description: Following list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  following:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  total:
                    type: integer

  /follows/{userId}/counts:
    get:
      summary: Get Follow Counts
      description: Returns follower and following counts for a user
      tags:
        - Follows
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User ID
      responses:
        '200':
          description: Follow counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  followers:
                    type: integer
                  following:
                    type: integer

  /follows/{userId}/status:
    get:
      summary: Get Follow Status
      description: Check whether the authenticated user follows the specified user
      tags:
