              schema:
                $ref: '#/components/schemas/Error'

  /plans/{id}/access-requests:
    parameters:
      - $ref: '#/components/parameters/planId'
    post:
      summary: Request Plan Access
      description: |
        Submit an access request to the plan owner. Requires the plan owner to have the
        `plan_access_requests` feature flag enabled. If the user already has access or
        an existing pending request, appropriate errors are returned. An email notification
        with an approval token link is sent to the plan owner.
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  description: Optional message to include with the access request
      responses:
        '200':
          description: Access request submitted (or updated if a pending request already exists)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AccessRequest'
        '400':
          description: User already has access, or invalid plan ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Plan access requests not enabled for this plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Plan not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Access request already exists and has been processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      summary: Get Access Requests
      description: |
        Retrieve access requests for a plan. Only the plan owner or super admin can view.
        By default returns only pending requests. Pass `?all=true` to include all statuses.
      security:
        - bearerAuth: []
      parameters:
        - name: all
          in: query
          schema:
            type: string
            enum: ['true', 'false']
          description: When 'true', returns all requests including approved/declined
      responses:
        '200':
          description: Access requests retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AccessRequest'
        '403':
          description: Only plan owner can view access requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Plan not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /plans/{id}/access-requests/{requestId}:
    parameters:
      - $ref: '#/components/parameters/planId'
      - name: requestId
        in: path
        required: true
        schema:
          type: string
        description: Access request ID
    patch:
      summary: Respond to Access Request
      description: |
        Approve or decline a pending access request. Only the plan owner or super admin
        can respond. Approving adds the requester as a collaborator on the plan.
        The requester is notified of the decision via email and BienBot.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - action
              properties:
                action:
                  type: string
                  enum: [approve, decline]
                  description: Whether to approve or decline the access request
      responses:
        '200':
          description: Access request responded to
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AccessRequest'
        '400':
          description: Invalid action or request already processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Only plan owner can respond to access requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Plan or access request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /plans/{id}/access-requests/approve-by-token:
    parameters:
      - $ref: '#/components/parameters/planId'
    get:
      summary: Approve Access Request via Token
      description: |
        Token-based one-click approval from email link. No authentication required.
        Redirects to the plan URL on success, or the frontend with error query params
        on failure. Token is single-use and expires after 7 days.
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: Approval token from the email notification
      responses:
        '302':
          description: Redirects to plan URL (success) or frontend with error (failure)
          headers:
            Location:
              schema:
                type: string
              description: Redirect URL

