  # Chat API Endpoints
  # These endpoints require the 'chat' feature flag (evaluated on plan owner for plan/plan-item channels).
  # Powered by Stream Chat. All endpoints require authentication.

  /chat/token:
    post:
      summary: Get Chat Token
      description: |
        Generate a Stream Chat user token for the authenticated user.
        Used to initialize the Stream Chat client on the frontend.
      tags:
        - Chat
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token generated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token:
                            type: string
                            description: Stream Chat JWT token
                          user:
                            type: object
                            properties:
                              id:
                                type: string
                              name:
                                type: string
        '501':
          description: Chat service not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /chat/channels/dm:
    post:
      summary: Create or Get DM Channel
      description: |
        Create or retrieve a direct message channel between the authenticated user and
        another user. DM eligibility requires one of:
        1. Actor is a super admin
        2. Users mutually follow each other
        3. Actor is a curator AND target has planned one of actor's experiences

        Channel IDs are deterministic (sorted user IDs).
      tags:
        - Chat
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - otherUserId
              properties:
                otherUserId:
                  type: string
                  description: User ID of the other participant
      responses:
        '200':
          description: DM channel ready
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ChatChannel'
        '403':
          description: DM eligibility not met
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '501':
          description: Chat service not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

