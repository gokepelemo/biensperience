openapi: 3.1.0
info:
  title: Biensperience API
  description: |
    # Biensperience Travel Experience Platform API

    Biensperience is a visual travel experience platform that enables users to plan experiences and share their plans with other users who can plan similar experiences. Users can create detailed travel plans with checklists, photos, and hierarchical plan items, then share these experiences to inspire and guide others in planning their own adventures.

    ## Authentication

    The API supports multiple authentication methods:

    ### JWT Authentication
    Most endpoints require JWT authentication via the `Authorization` header:
    ```
    Authorization: Bearer <jwt_token>
    ```

    ### OAuth Authentication
    Social login via Facebook, Google, and Twitter is supported through dedicated OAuth endpoints.

    ### API Tokens
    For programmatic access, API tokens can be used instead of JWT tokens.

    ## Rate Limiting

    The API implements comprehensive rate limiting:
    - **Authentication endpoints**: 5 requests per 15 minutes
    - **API endpoints**: 1000 requests per 15 minutes (configurable)
    - **Modification endpoints**: 100 requests per 15 minutes
    - **Collaborator management**: 50 requests per 15 minutes
    - **AI endpoints**: 100 requests per 15 minutes
    - **BienBot endpoints**: 30 requests per 15 minutes (super admins exempt)

    ## Feature Flags

    Certain features require feature flags to be enabled on the user account:

    | Flag | Description |
    |------|-------------|
    | `ai_features` | Access to AI-powered features (autocomplete, improve, translate, summarize, generate tips) |
    | `beta_ui` | Access to beta UI features |
    | `advanced_analytics` | Access to advanced analytics features |
    | `real_time_collaboration` | Real-time collaboration via WebSocket |
    | `document_ai_parsing` | AI-powered document parsing and extraction |
    | `bulk_export` | Bulk export of plans and experiences |
    | `curator` | Curator designation for creating curated experiences with bio and links |
    | `chat` | In-app messaging (provider-agnostic) |
    | `bienbot` | BienBot AI assistant (alias for ai_features in some contexts) |

    Requests to feature-gated endpoints without the required flag return 403 Forbidden.
    Super admins bypass all feature flag requirements.

    ## Permissions Framework

    Resources implement a role-based permissions system:

    ### Permission Roles
    - **Owner**: Full control over resource (edit, delete, manage permissions)
    - **Collaborator**: Can edit content but cannot manage permissions or delete
    - **Contributor**: Can view and create derivative works (fork/clone)

    ### Permission Inheritance
    Resources can inherit permissions from related resources with a maximum depth of 3 levels.

    ## Error Responses

    All API errors follow a consistent format:
    ```json
    {
      "success": false,
      "error": "Error message",
      "details": {
        "field": "validation error details"
      }
    }
    ```

    Common HTTP status codes:
    - `200`: Success
    - `201`: Created
    - `400`: Bad Request
    - `401`: Unauthorized
    - `403`: Forbidden
    - `404`: Not Found
    - `409`: Conflict
    - `422`: Validation Error
    - `429`: Too Many Requests
    - `500`: Internal Server Error

    ## File Upload

    The API supports file uploads for photos and documents:

    ### Photo Upload
    - **Formats**: JPEG, PNG, WebP
    - **Max size**: 10MB per file
    - **Storage**: AWS S3 with automatic optimization

    ### Document Upload
    - **Formats**: PDF, DOC, DOCX, TXT
    - **Max size**: 25MB per file
    - **Storage**: Protected S3 bucket for sensitive documents

    ## WebSocket Support

    Real-time features are available via WebSocket when enabled:
    - Live collaboration on plans
    - Real-time notifications
    - Activity feed updates

    ## Data Models

    ### User
    Represents authenticated users with profile information, preferences, and social accounts.

    ### Destination
    Travel locations with fuzzy matching for duplicates and collaborative permissions.

    ### Experience
    Core travel experiences with hierarchical plan items, photos, and sharing capabilities.

    ### Plan
    User-specific instances of experiences with completion tracking and collaboration features.

    ### Photo
    Image assets with permission-based visibility control and AWS S3 storage.

    ### Document
    Uploaded documents with secure storage and access controls.
  version: 0.6.4
  contact:
    name: Biensperience Support
    url: https://github.com/gokepelemo/biensperience
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3001/api
    description: Development server
  - url: https://api.biensperience.com/api
    description: Production server

security:
  - bearerAuth: []
  - apiTokenAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from login or OAuth flow
    apiTokenAuth:
      type: apiKey
      in: header
      name: X-API-Token
      description: API token for programmatic access

  schemas:
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          description: Error message
        details:
          type: object
          description: Additional error details
      required:
        - success
        - error

    Success:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          description: Response data
        message:
          type: string
          description: Success message
      required:
        - success

    User:
      type: object
      properties:
        _id:
          type: string
          description: User ID
        name:
          type: string
          description: Full name
        email:
          type: string
          format: email
          description: Email address
        provider:
          type: string
          enum: [local, facebook, google, twitter]
          description: Authentication provider
        photos:
          type: array
          items:
            type: string
          description: Array of photo IDs
        default_photo_id:
          type: string
          description: Default profile photo ID
        isSuperAdmin:
          type: boolean
          description: Super admin status
        role:
          type: string
          enum: [super_admin, regular_user]
          description: User role
        emailConfirmed:
          type: boolean
          description: Email verification status
        visibility:
          type: string
          enum: [private, public]
          description: Profile visibility
        preferences:
          type: object
          properties:
            theme:
              type: string
              enum: [light, dark, system-default]
            currency:
              type: string
            language:
              type: string
            timezone:
              type: string
            profileVisibility:
              type: string
              enum: [private, public]
            notifications:
              type: object
              properties:
                enabled:
                  type: boolean
                channels:
                  type: array
                  items:
                    type: string
                    enum: [email, push, sms]
                types:
                  type: array
                  items:
                    type: string
                    enum: [activity, reminder, marketing, updates]
        location:
          type: object
          properties:
            displayName:
              type: string
            city:
              type: string
            state:
              type: string
            country:
              type: string
            countryCode:
              type: string
            postalCode:
              type: string
            coordinates:
              type: object
              properties:
                type:
                  type: string
                  enum: [Point]
                coordinates:
                  type: array
                  items:
                    type: number
                  minItems: 2
                  maxItems: 2
                  description: "[longitude, latitude]"
        feature_flags:
          type: array
          items:
            $ref: '#/components/schemas/FeatureFlag'
          description: Feature flags controlling access to platform features
        bio:
          type: string
          maxLength: 500
          description: Curator bio/about text (requires curator feature flag)
        links:
          type: array
          items:
            $ref: '#/components/schemas/UserLink'
          description: Curator external links (requires curator feature flag)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - _id
        - name
        - email

    Destination:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        country:
          type: string
        state:
          type: string
        overview:
          type: string
        map_location:
          type: string
          description: Legacy string location field (deprecated, use location)
        location:
          $ref: '#/components/schemas/Location'
        photos:
          type: array
          items:
            type: string
        default_photo_id:
          type: string
        travel_tips:
          type: array
          items:
            oneOf:
              - type: string
              - type: object
                properties:
                  type:
                    type: string
                  value:
                    type: string
                required:
                  - type
                  - value
        visibility:
          type: string
          enum: [private, contributors, public]
          default: public
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        users_favorite:
          type: array
          items:
            type: string
          description: Array of User IDs who favorited this destination
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - _id
        - name
        - country

    Experience:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        overview:
          type: string
        destination:
          $ref: '#/components/schemas/Destination'
        experience_type:
          type: array
          items:
            type: string
        plan_items:
          type: array
          items:
            $ref: '#/components/schemas/PlanItem'
        photos:
          type: array
          items:
            type: string
        default_photo_id:
          type: string
        visibility:
          type: string
          enum: [private, contributors, public]
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        difficulty:
          type: number
          minimum: 1
          maximum: 10
        rating:
          type: number
          minimum: 0
          maximum: 5
        cost_estimate:
          type: number
          description: Virtual property - total estimated cost
        max_planning_days:
          type: number
          description: Virtual property - maximum planning days
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - _id
        - name
        - destination

    PlanItem:
      type: object
      properties:
        _id:
          type: string
        text:
          type: string
        photo:
          type: string
        url:
          type: string
        cost_estimate:
          type: number
        planning_days:
          type: number
        parent:
          type: string
          description: Parent plan item ID for hierarchy
        activity_type:
          type: string
          enum: [food, transport, accommodation, activity, shopping, entertainment, sightseeing, custom, null]
        location:
          $ref: '#/components/schemas/Location'
      required:
        - text

    Plan:
      type: object
      properties:
        _id:
          type: string
        experience:
          $ref: '#/components/schemas/Experience'
        user:
          $ref: '#/components/schemas/User'
        planned_date:
          type: string
          format: date
        plan:
          type: array
          items:
            $ref: '#/components/schemas/PlanItemSnapshot'
        costs:
          type: array
          items:
            $ref: '#/components/schemas/Cost'
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        notes:
          type: string
        total_cost:
          type: number
          description: Virtual property - total cost
        max_planning_days:
          type: number
          description: Virtual property - maximum planning days
        completion_percentage:
          type: number
          description: Virtual property - completion percentage
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - _id
        - experience
        - user

    PlanItemSnapshot:
      type: object
      properties:
        _id:
          type: string
        plan_item_id:
          type: string
        complete:
          type: boolean
        cost:
          type: number
        planning_days:
          type: number
        text:
          type: string
        url:
          type: string
        photo:
          type: string
        parent:
          type: string
        activity_type:
          type: string
          enum: [food, transport, accommodation, activity, shopping, entertainment, sightseeing, custom, null]
        scheduled_date:
          type: string
          format: date
        scheduled_time:
          type: string
        location:
          $ref: '#/components/schemas/Location'
        details:
          type: object
          properties:
            notes:
              type: array
              items:
                $ref: '#/components/schemas/Note'
            photos:
              type: array
              items:
                type: string
            documents:
              type: array
              items:
                $ref: '#/components/schemas/DocumentReference'
            transport:
              $ref: '#/components/schemas/TransportExtension'
            parking:
              $ref: '#/components/schemas/ParkingExtension'
            discount:
              $ref: '#/components/schemas/DiscountExtension'
        assignedTo:
          type: string
          description: User ID of assigned collaborator
      required:
        - plan_item_id

    Permission:
      type: object
      properties:
        _id:
          type: string
          description: User or resource ID
        entity:
          type: string
          enum: [user, destination, experience]
        type:
          type: string
          enum: [owner, collaborator, contributor]
        granted_at:
          type: string
          format: date-time
        granted_by:
          type: string
          description: User ID who granted permission
      required:
        - _id
        - entity
        - type

    Location:
      type: object
      properties:
        address:
          type: string
        geo:
          type: object
          properties:
            type:
              type: string
              enum: [Point]
            coordinates:
              type: array
              items:
                type: number
              minItems: 2
              maxItems: 2
              description: "[longitude, latitude]"
        city:
          type: string
        state:
          type: string
        country:
          type: string
        postalCode:
          type: string
        placeId:
          type: string
      required:
        - address

    Cost:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        description:
          type: string
        cost:
          type: number
        currency:
          type: string
          default: USD
        category:
          type: string
          enum: [accommodation, transport, food, activities, equipment, other, null]
          description: Cost category for grouping and reporting
        date:
          type: string
          format: date-time
          description: Date when the cost was incurred
        plan_item:
          type: string
          description: Linked plan item ID
        collaborator:
          type: string
          description: User ID who paid or is responsible
        created_at:
          type: string
          format: date-time
      required:
        - title
        - cost

    Note:
      type: object
      properties:
        _id:
          type: string
        user:
          type: string
          description: User ID who created the note
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - user
        - content

    DocumentReference:
      type: object
      properties:
        document:
          type: string
          description: Document ID
        addedBy:
          type: string
          description: User ID who added the document
        addedAt:
          type: string
          format: date-time
        displayName:
          type: string
        contextNotes:
          type: string
      required:
        - document

    TransportExtension:
      type: object
      properties:
        mode:
          type: string
          enum: [flight, train, cruise, ferry, bus, coach, car_share, ride, metro, local_transit, bike_rental, scooter]
        vendor:
          type: string
        trackingNumber:
          type: string
        country:
          type: string
        departureTime:
          type: string
          format: date-time
        arrivalTime:
          type: string
          format: date-time
        departureLocation:
          type: string
        arrivalLocation:
          type: string
        status:
          type: string
          enum: [scheduled, active, completed, cancelled, delayed]
        transportNotes:
          type: string
        flight:
          type: object
          properties:
            terminal:
              type: string
            arrivalTerminal:
              type: string
            gate:
              type: string
            arrivalGate:
              type: string
        train:
          type: object
          properties:
            carriageNumber:
              type: string
            platform:
              type: string
            arrivalPlatform:
              type: string
        cruise:
          type: object
          properties:
            deck:
              type: string
            shipName:
              type: string
            embarkationPort:
              type: string
            disembarkationPort:
              type: string
        bus:
          type: object
          properties:
            stopName:
              type: string
            arrivalStopName:
              type: string
        carShare:
          type: object
          properties:
            vehicleModel:
              type: string
            vehicleColor:
              type: string
            licensePlate:
              type: string
            pickupSpot:
              type: string
        metro:
          type: object
          properties:
            lineNumber:
              type: string
            direction:
              type: string
            platform:
              type: string
      required:
        - mode

    ParkingExtension:
      type: object
      properties:
        parkingType:
          type: string
          enum: [street, garage, lot, valet, hotel, airport, venue, private, other]
        facilityName:
          type: string
        address:
          type: string
        spotNumber:
          type: string
        level:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        cost:
          type: number
        currency:
          type: string
        prepaid:
          type: boolean
        confirmationNumber:
          type: string
        accessCode:
          type: string
        status:
          type: string
          enum: [reserved, active, completed, cancelled]
        parkingNotes:
          type: string
      required:
        - parkingType

    DiscountExtension:
      type: object
      properties:
        discountType:
          type: string
          enum: [promo_code, coupon, loyalty, member, early_bird, group, seasonal, referral, other]
        code:
          type: string
        description:
          type: string
        discountValue:
          type: number
        isPercentage:
          type: boolean
        currency:
          type: string
        minimumPurchase:
          type: number
        maxDiscount:
          type: number
        expiresAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, applied, expired, invalid]
        source:
          type: string
        discountNotes:
          type: string
      required:
        - discountType

    Photo:
      type: object
      properties:
        _id:
          type: string
        filename:
          type: string
        originalName:
          type: string
        mimeType:
          type: string
        size:
          type: number
        s3Key:
          type: string
        url:
          type: string
        caption:
          type: string
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - _id
        - filename
        - s3Key

    Activity:
      type: object
      properties:
        _id:
          type: string
        timestamp:
          type: string
          format: date-time
        action:
          type: string
          enum:
            - resource_created
            - resource_updated
            - resource_deleted
            - permission_added
            - permission_removed
            - collaborator_added
            - collaborator_removed
            - plan_created
            - plan_updated
            - plan_deleted
            - plan_item_completed
            - plan_item_uncompleted
            - plan_item_photo_added
            - plan_item_visibility_changed
            - plan_item_note_added
            - plan_item_note_updated
            - plan_item_note_deleted
            - cost_added
            - cost_updated
            - cost_deleted
            - follow_created
            - follow_removed
            - favorite_added
            - favorite_removed
            - experience_planned
        actor:
          type: object
          properties:
            _id:
              type: string
            email:
              type: string
            name:
              type: string
            role:
              type: string
        resource:
          type: object
          properties:
            id:
              type: string
            type:
              type: string
              enum: [User, Destination, Experience, Plan, Photo, Document, PlanItem]
            name:
              type: string
        target:
          type: object
          properties:
            id:
              type: string
            type:
              type: string
            name:
              type: string
        previousState:
          type: object
        newState:
          type: object
        reason:
          type: string
        metadata:
          type: object
        parentActivityId:
          type: string
          nullable: true
          description: Groups multi-step flows; child activities are hidden from feeds
        tags:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [success, failure, partial]
      required:
        - timestamp
        - action
        - actor
        - resource

    AccessRequest:
      type: object
      properties:
        _id:
          type: string
          description: Access request ID
        requester:
          oneOf:
            - type: string
            - type: object
              properties:
                _id:
                  type: string
                name:
                  type: string
                email:
                  type: string
          description: Requester user ID or populated user object
        message:
          type: string
          description: Optional message from the requester
        status:
          type: string
          enum: [pending, approved, declined]
        respondedAt:
          type: string
          format: date-time
          description: When the request was responded to
        respondedBy:
          type: string
          description: User ID of who responded
        createdAt:
          type: string
          format: date-time

    ChatChannel:
      type: object
      description: Chat channel information returned by channel creation endpoints
      properties:
        type:
          type: string
          example: messaging
          description: Stream Chat channel type
        id:
          type: string
          description: Channel ID (deterministic based on context)
          examples:
            - dm_user1_user2
            - plan_abc123
            - planItem_abc123_def456
        members:
          type: array
          items:
            type: string
          description: User IDs of channel members

    EnrichedActivityFeedItem:
      type: object
      description: Enriched activity item returned by dashboard and follow feed endpoints
      properties:
        id:
          type: string
          description: Activity ID
        action:
          type: string
          description: Human-readable action text (e.g., "Created", "Planned")
        actionType:
          type: string
          description: Raw action type for client-side filtering (e.g., "plan_created")
        item:
          type: string
          nullable: true
          description: Display name of the primary resource
        targetItem:
          type: string
          nullable: true
          description: Display name of the target (e.g., plan item name for completions)
        link:
          type: string
          nullable: true
          description: Deep link to the resource (may include hash fragments)
        time:
          type: string
          description: Relative time string (e.g., "2 hours ago")
        timestamp:
          type: string
          format: date-time
          description: ISO timestamp of the activity
        resourceType:
          type: string
          description: Resource type (Experience, Plan, Destination, User)
        actorId:
          type: string
          description: ID of the user who performed the action
        targetId:
          type: string
          nullable: true
          description: ID of the target entity
        actorName:
          type: string
          nullable: true
          description: Name of the user who performed the action
        actorPhoto:
          type: string
          nullable: true
          description: URL of the actor's profile photo for avatar display
        targetName:
          type: string
          nullable: true
          description: Name of the target entity
        photoId:
          type: string
          nullable: true
          description: Photo ID for plan_item_photo_added activities (for thumbnail display)
      required:
        - id
        - action
        - actionType
        - time
        - timestamp

    Document:
      type: object
      properties:
        _id:
          type: string
        user:
          type: string
          description: Document owner ID
        entityType:
          type: string
          enum: [plan, plan_item, experience, destination]
        entityId:
          type: string
        planId:
          type: string
        planItemId:
          type: string
        originalFilename:
          type: string
        mimeType:
          type: string
        fileSize:
          type: integer
        documentType:
          type: string
          enum: [pdf, image, word, text]
        s3Key:
          type: string
        s3Url:
          type: string
        s3Bucket:
          type: string
        isProtected:
          type: boolean
        bucketType:
          type: string
          enum: [public, protected]
        status:
          type: string
          enum: [pending, processing, completed, failed, reprocessing]
        extractedText:
          type: string
        processingResult:
          type: object
          properties:
            method:
              type: string
              enum: [tesseract-ocr, llm-vision, pdf-parse, mammoth, direct-read, placeholder, failed]
            confidence:
              type: number
            characterCount:
              type: integer
            pageCount:
              type: integer
            language:
              type: string
            processedAt:
              type: string
              format: date-time
        aiParsedData:
          type: object
          properties:
            documentType:
              type: string
              enum: [flight, hotel, activity, restaurant, transport, receipt, itinerary, other]
            summary:
              type: string
            confirmationNumber:
              type: string
            totalCost:
              type: number
            currency:
              type: string
        aiParsingEnabled:
          type: boolean
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
        metadata:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
              value:
                type: string
              type:
                type: string
        lastProcessedAt:
          type: string
          format: date-time
        processAttempts:
          type: integer
        maxProcessAttempts:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - _id
        - user
        - entityType
        - entityId
        - originalFilename
        - mimeType
        - fileSize
        - documentType
        - s3Key
        - s3Url
        - s3Bucket

    DocumentResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/Document'
        message:
          type: string

    SearchResult:
      type: object
      properties:
        destinations:
          type: array
          items:
            $ref: '#/components/schemas/Destination'
        experiences:
          type: array
          items:
            $ref: '#/components/schemas/Experience'
        plans:
          type: array
          items:
            $ref: '#/components/schemas/Plan'
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
        total:
          type: number

    Dashboard:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        stats:
          type: object
          properties:
            totalExperiences:
              type: number
            totalPlans:
              type: number
            completedPlans:
              type: number
            upcomingPlans:
              type: number
        recentActivity:
          type: array
          items:
            $ref: '#/components/schemas/Activity'
        upcomingPlans:
          type: array
          items:
            $ref: '#/components/schemas/Plan'

    Invite:
      type: object
      properties:
        _id:
          type: string
        email:
          type: string
          format: email
        invitedBy:
          type: string
          description: User ID who sent the invite
        inviteCode:
          type: string
        status:
          type: string
          enum: [pending, accepted, expired, cancelled]
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        acceptedAt:
          type: string
          format: date-time
      required:
        - email
        - invitedBy
        - inviteCode

    Token:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        token:
          type: string
        user:
          type: string
          description: User ID
        permissions:
          type: array
          items:
            type: string
            enum: [read, write, admin]
        expiresAt:
          type: string
          format: date-time
        lastUsed:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - name
        - token
        - user

    FeatureFlag:
      type: object
      description: Feature flag controlling access to platform features
      properties:
        flag:
          type: string
          description: Unique feature flag identifier
          enum: [ai_features, beta_ui, advanced_analytics, real_time_collaboration, document_ai_parsing, bulk_export, curator, chat]
        enabled:
          type: boolean
          default: true
          description: Whether the flag is enabled
        config:
          type: object
          description: Optional JSON configuration for the flag
        granted_at:
          type: string
          format: date-time
          description: When the flag was granted
        granted_by:
          type: string
          description: User ID who granted the flag
        expires_at:
          type: string
          format: date-time
          description: Optional expiration date (null = never expires)
        reason:
          type: string
          description: Optional reason for granting the flag
      required:
        - flag

    UserLink:
      type: object
      description: External link for curator profiles
      properties:
        type:
          type: string
          enum: [twitter, instagram, facebook, youtube, tiktok, linkedin, pinterest, github, website, custom]
          default: custom
          description: Link type (social network or custom)
        username:
          type: string
          description: Username for social networks (without URL prefix)
        title:
          type: string
          maxLength: 100
          description: Display title for the link
        url:
          type: string
          format: uri
          description: Full URL
        meta:
          type: object
          description: Optional metadata
      required:
        - title
        - url

    AICompletionRequest:
      type: object
      description: Request for AI text completion
      properties:
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum: [system, user, assistant]
              content:
                type: string
            required:
              - role
              - content
        task:
          type: string
          enum: [autocomplete, improve, translate, summarize, general]
          default: general
        options:
          type: object
          properties:
            provider:
              type: string
              enum: [openai, anthropic, mistral, gemini]
            model:
              type: string
            temperature:
              type: number
              minimum: 0
              maximum: 1
            maxTokens:
              type: integer
              minimum: 1
              maximum: 4096
      required:
        - messages

    AICompletionResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            content:
              type: string
              description: Generated text content
            usage:
              type: object
              properties:
                inputTokens:
                  type: integer
                outputTokens:
                  type: integer
                totalTokens:
                  type: integer
            model:
              type: string
              description: Model used for completion
            provider:
              type: string
              description: AI provider used

    AIStatusResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            available:
              type: boolean
              description: Whether AI features are available
            defaultProvider:
              type: string
              description: Default AI provider
            providers:
              type: object
              description: Map of provider name to configured status
              additionalProperties:
                type: boolean

    BienBotSession:
      type: object
      description: BienBot AI assistant conversation session
      properties:
        _id:
          type: string
          description: Session ID
        user:
          type: string
          description: User ID (session owner)
        title:
          type: string
          description: Auto-generated from first user message (max 80 chars)
        invoke_context:
          type: object
          description: Entity page where BienBot was opened (set at session creation)
          properties:
            entity:
              type: string
              enum: [destination, experience, plan, plan_item, user]
              nullable: true
            entity_id:
              type: string
              nullable: true
            entity_label:
              type: string
              description: Resolved from DB (never trusts client)
              nullable: true
        context:
          type: object
          description: Accumulated entity IDs as conversation progresses
          properties:
            destination_id:
              type: string
              nullable: true
            experience_id:
              type: string
              nullable: true
            plan_id:
              type: string
              nullable: true
            plan_item_id:
              type: string
              nullable: true
        messages:
          type: array
          description: Multi-turn conversation history
          items:
            $ref: '#/components/schemas/BienBotMessage'
        summary:
          type: object
          description: Cached resume summary (6-hour TTL)
          properties:
            text:
              type: string
              nullable: true
            suggested_next_steps:
              type: array
              items:
                type: string
            generated_at:
              type: string
              format: date-time
              nullable: true
        pending_actions:
          type: array
          description: Proposed actions awaiting user confirmation
          items:
            $ref: '#/components/schemas/BienBotPendingAction'
        status:
          type: string
          enum: [active, archived]
          default: active
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - user
        - status

    BienBotMessage:
      type: object
      description: A single conversation turn in a BienBot session
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        timestamp:
          type: string
          format: date-time
        intent:
          type: string
          nullable: true
          description: Intent classification from the classifier
        actions_taken:
          type: array
          items:
            type: string
          description: Action types executed in this turn
        message_type:
          type: string
          enum: [shared_comment]
          nullable: true
          description: |
            Set to `shared_comment` for peer-exchange messages (not forwarded to the LLM).
            These are sent either by a non-owner collaborator or by the session owner using
            the `/message` slash command, and by owners replying directly to a collaborator message.
        sent_by:
          type: string
          nullable: true
          description: |
            ObjectId of the user who sent this message. Present on `user`-role messages in shared
            sessions and on optimistic `shared_comment` messages so the UI can distinguish the
            current user's own messages from collaborator messages before the server response arrives.
        msg_id:
          type: string
          nullable: true
          description: |
            Stable message identifier used for reply threading. Present on persisted messages;
            absent on optimistic placeholders.
        reply_to:
          type: string
          nullable: true
          description: msg_id of the message this is a reply to (shared_comment replies only)
        sender_name:
          type: string
          nullable: true
          description: Display name of the sender (populated for collaborator shared_comment messages)
      required:
        - role
        - content

    BienBotPendingAction:
      type: object
      description: A proposed action awaiting user confirmation
      properties:
        id:
          type: string
          description: Unique action ID (action_<8_random_chars>)
        type:
          type: string
          enum:
            - create_destination
            - update_destination
            - toggle_favorite_destination
            - create_experience
            - update_experience
            - add_experience_plan_item
            - update_experience_plan_item
            - delete_experience_plan_item
            - create_plan
            - update_plan
            - delete_plan
            - add_plan_items
            - update_plan_item
            - delete_plan_item
            - add_plan_item_note
            - add_plan_item_detail
            - assign_plan_item
            - unassign_plan_item
            - add_plan_cost
            - update_plan_cost
            - delete_plan_cost
            - invite_collaborator
            - remove_collaborator
            - sync_plan
            - set_member_location
            - remove_member_location
            - workflow
          description: |
            One of the 27 allowed action types. `workflow` is a meta-type that
            composes multiple steps with `$step_N.field` dependency references.
        payload:
          type: object
          description: Action-specific parameters. For `workflow`, contains a `steps` array.
        description:
          type: string
          description: Human-readable description shown in the confirmation UI
        executed:
          type: boolean
          default: false
        result:
          type: object
          nullable: true
          description: Result of execution (populated after execution)
      required:
        - id
        - type
        - payload
        - description

    BienBotChatRequest:
      type: object
      description: Request body for the BienBot chat endpoint
      properties:
        message:
          type: string
          maxLength: 8000
          description: User message text
        sessionId:
          type: string
          nullable: true
          description: Existing session ID, or omit to create a new session
        invokeContext:
          type: object
          nullable: true
          description: Entity context (only sent on first message when sessionId is null)
          properties:
            entity:
              type: string
              enum: [destination, experience, plan, plan_item, user]
            id:
              type: string
              description: Entity ID
            label:
              type: string
              description: Display label (resolved server-side, client value ignored)
          required:
            - entity
            - id
      required:
        - message

    BienBotExecuteRequest:
      type: object
      description: Request body for executing pending actions
      properties:
        actionIds:
          type: array
          items:
            type: string
          description: Array of pending action IDs to execute
          minItems: 1
      required:
        - actionIds

    BienBotExecuteResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            results:
              type: array
              items:
                type: object
                properties:
                  actionId:
                    type: string
                  type:
                    type: string
                  success:
                    type: boolean
                  result:
                    type: object
                    nullable: true
                  errors:
                    type: array
                    items:
                      type: string
            contextUpdates:
              type: object
              description: Entity IDs added to session context from execution results
            session:
              type: object
              properties:
                id:
                  type: string
                context:
                  type: object

    BienBotResumeResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            session:
              $ref: '#/components/schemas/BienBotSession'
            greeting:
              type: object
              properties:
                role:
                  type: string
                  enum: [assistant]
                content:
                  type: string
                  description: Welcome back greeting with session recap
                suggested_next_steps:
                  type: array
                  items:
                    type: string
                  description: 2-3 actionable follow-up suggestions

  parameters:
    experienceId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Experience ID
    planId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Plan ID
    userId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: User ID
    destinationId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Destination ID
    photoId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Photo ID
    documentId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Document ID
    planItemId:
      name: itemId
      in: path
      required: true
      schema:
        type: string
      description: Plan item ID
    noteId:
      name: noteId
      in: path
      required: true
      schema:
        type: string
      description: Note ID
    costId:
      name: costId
      in: path
      required: true
      schema:
        type: string
      description: Cost ID
    tokenId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Token ID
    inviteId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Invite ID
    page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number for pagination
    limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 50
        default: 10
      description: Number of items per page
    paginate:
      name: paginate
      in: query
      schema:
        type: boolean
        default: false
      description: Whether to use pagination
    searchQuery:
      name: q
      in: query
      schema:
        type: string
      description: Search query string
    searchTypes:
      name: types
      in: query
      schema:
        type: array
        items:
          type: string
          enum: [destination, experience, plan, user]
      description: Types of resources to search
    tag:
      name: tag
      in: query
      schema:
        type: string
      description: Experience tag filter

paths:
  /:
    get:
      summary: API Information
      description: Returns API information and available endpoints
      responses:
        '200':
          description: API information
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  status:
                    type: string
                  version:
                    type: string
                  frontend:
                    type: object
                  api:
                    type: object

  /health-check:
    get:
      summary: Health Check
      description: Simple health check endpoint
      responses:
        '200':
          description: Service is healthy
          content:
            text/plain:
              schema:
                type: string
                example: OK

  /auth/csrf-token:
    get:
      summary: Get CSRF Token
      description: Generates and returns a CSRF token for the client
      responses:
        '200':
          description: CSRF token generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  csrfToken:
                    type: string

  /auth/facebook:
    get:
      summary: Facebook OAuth Initiation
      description: Initiates Facebook OAuth login flow
      parameters:
        - name: state
          in: query
          schema:
            type: string
          description: CSRF state parameter
      responses:
        '302':
          description: Redirect to Facebook OAuth

  /auth/facebook/callback:
    get:
      summary: Facebook OAuth Callback
      description: Handles Facebook OAuth callback
      responses:
        '302':
          description: Redirect to frontend with OAuth result

  /auth/google:
    get:
      summary: Google OAuth Initiation
      description: Initiates Google OAuth login flow
      responses:
        '302':
          description: Redirect to Google OAuth

  /auth/google/callback:
    get:
      summary: Google OAuth Callback
      description: Handles Google OAuth callback
      responses:
        '302':
          description: Redirect to frontend with OAuth result

  /auth/twitter:
    get:
      summary: Twitter OAuth Initiation
      description: Initiates Twitter OAuth login flow
      responses:
        '302':
          description: Redirect to Twitter OAuth

  /auth/twitter/callback:
    get:
      summary: Twitter OAuth Callback
      description: Handles Twitter OAuth callback
      responses:
        '302':
          description: Redirect to frontend with OAuth result

  /auth/link/facebook:
    get:
      summary: Link Facebook Account
      description: Links Facebook account to existing user
      security:
        - bearerAuth: []
      responses:
        '302':
          description: Redirect to profile settings

  /auth/link/google:
    get:
      summary: Link Google Account
      description: Links Google account to existing user
      security:
        - bearerAuth: []
      responses:
        '302':
          description: Redirect to profile settings

  /auth/link/twitter:
    get:
      summary: Link Twitter Account
      description: Links Twitter account to existing user
      security:
        - bearerAuth: []
      responses:
        '302':
          description: Redirect to profile settings

  /auth/unlink/{provider}:
    delete:
      summary: Unlink Social Account
      description: Removes social account link from user profile
      security:
        - bearerAuth: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [facebook, google, twitter]
      responses:
        '200':
          description: Account unlinked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '400':
          description: Invalid provider or cannot unlink only auth method
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/linked-accounts:
    get:
      summary: Get Linked Accounts
      description: Returns user's linked social accounts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Linked accounts information
          content:
            application/json:
              schema:
                type: object
                properties:
                  facebook:
                    type: boolean
                  google:
                    type: boolean
                  twitter:
                    type: boolean
                  hasPassword:
                    type: boolean
                  accounts:
                    type: array
                    items:
                      type: object

  /auth/logout:
    post:
      summary: Logout
      description: Logs out the current user and clears session
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /users:
    post:
      summary: Create User
      description: Creates a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 3
                inviteCode:
                  type: string
              required:
                - name
                - email
                - password
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      summary: Get All Users
      description: Returns a list of all users (admin only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      totalCount:
                        type: integer
                      totalPages:
                        type: integer
                      hasMore:
                        type: boolean
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/bulk:
    get:
      summary: Get Bulk Users
      description: Returns multiple users by IDs
      security:
        - bearerAuth: []
      parameters:
        - name: ids
          in: query
          required: true
          schema:
            type: array
            items:
              type: string
          description: User IDs to fetch
      responses:
        '200':
          description: Bulk user data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

  /users/search:
    get:
      summary: Search Users
      description: Searches for users by name or email
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

  /users/profile:
    get:
      summary: Get Current User Profile
      description: Returns the current user's profile information
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /users/{id}:
    parameters:
      - $ref: '#/components/parameters/userId'
    get:
      summary: Get User by ID
      description: Returns a specific user by ID
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Update User
      description: Updates user information
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                visibility:
                  type: string
                  enum: [private, public]
                preferences:
                  type: object
                  properties:
                    theme:
                      type: string
                      enum: [light, dark, system-default]
                    currency:
                      type: string
                    language:
                      type: string
                    timezone:
                      type: string
                    profileVisibility:
                      type: string
                      enum: [private, public]
                    notifications:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                        channels:
                          type: array
                          items:
                            type: string
                            enum: [email, push, sms]
                        types:
                          type: array
                          items:
                            type: string
                            enum: [activity, reminder, marketing, updates]
                location:
                  type: object
                  properties:
                    displayName:
                      type: string
                    city:
                      type: string
                    state:
                      type: string
                    country:
                      type: string
                    countryCode:
                      type: string
                    postalCode:
                      type: string
                    coordinates:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: [Point]
                        coordinates:
                          type: array
                          items:
                            type: number
                            minItems: 2
                            maxItems: 2
      responses:
        '200':
          description: User updated successfully
          content:
